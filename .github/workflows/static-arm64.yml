name: Static ARM64

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    - name: Build static bpftrace
      run: ./.github/include/static-arm64.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bpftrace-arm64-static
        path: build-static/src/bpftrace
